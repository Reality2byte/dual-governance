name: DualGovernance PR tests

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [develop, main]
  workflow_dispatch:

env:
  NODE_VERSION: '20.16.0'
  FORGE_VERSION: 'v1.0.0'
  MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
  ANVIL_RPC_URL: http://127.0.0.1:8545
  FUZZ_RUNS: '256'

concurrency:
  group: pr-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install all dependencies
        uses: ./.github/actions/repo-setup

      - name: Run unit tests
        run: npm run test:unit

  regressions_integration:
    name: regressions + integration
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [unit]

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install all dependencies
        uses: ./.github/actions/repo-setup

      - name: Start anvil fork
        run: |
          nohup anvil \
            --fork-url "$MAINNET_RPC_URL" \
            --port 8545 \
            --chain-id 1 > anvil.log 2>&1 &

          for i in {1..60}; do
            if curl -sS -X POST "$ANVIL_RPC_URL" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"web3_clientVersion","params":[]}'>/dev/null; then
              echo "anvil is up"
              exit 0
            fi
            sleep 1
          done
          echo "anvil did not start"; exit 1

      - name: Download vetoers accounts
        run: node test/regressions/regression-test-utils/download_vetoers.js

      - name: Run regressions + integration in parallel (shared anvil)
        shell: bash
        env:
          DEPLOY_ARTIFACT_FILE_NAME: deploy-artifact-mainnet.toml
          MAINNET_RPC_URL: ${{ env.ANVIL_RPC_URL }}
        run: |
          set -uo pipefail

          ( echo "[regressions] starting..."
            npm run test:regressions
          ) & PID_REG=$!

          ( echo "[integration] starting..."
            env -u DEPLOY_ARTIFACT_FILE_NAME \
              npm run test:integration
          ) & PID_INT=$!

          wait $PID_REG; RC_REG=$?
          wait $PID_INT; RC_INT=$?

          echo "[regressions] exit code: $RC_REG"
          echo "[integration] exit code: $RC_INT"

          if [ $RC_REG -ne 0 ] || [ $RC_INT -ne 0 ]; then
            exit 1
          fi
